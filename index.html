<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Reporting</title>
  <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f4f6f8;
      color: #1f2937;
    }

    .container {
      max-width: 1450px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 38px;
    }

    .subtitle {
      color: #6b7280;
      font-size: 15px;
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      align-items: end;
    }

    .filter-group label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 14px;
    }

    select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      background: white;
      font-size: 14px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      background: #2563eb;
      color: white;
      font-weight: 600;
      font-size: 14px;
    }

    button.secondary {
      background: #6b7280;
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .kpi {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 16px;
    }

    .kpi-title {
      color: #6b7280;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .kpi-value {
      font-size: 28px;
      font-weight: bold;
    }

    #chart {
      width: 100%;
      height: 720px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 14px;
    }

    th, td {
      border-bottom: 1px solid #e5e7eb;
      padding: 10px 8px;
      text-align: right;
    }

    th {
      background: #f9fafb;
      text-align: right;
      position: sticky;
      top: 0;
    }

    th:first-child, td:first-child,
    th:nth-child(2), td:nth-child(2),
    th:nth-child(3), td:nth-child(3),
    th:nth-child(5), td:nth-child(5) {
      text-align: left;
    }

    .table-wrap {
      max-height: 420px;
      overflow: auto;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
    }

    @media (max-width: 1100px) {
      .filters {
        grid-template-columns: 1fr 1fr;
      }
      .kpis {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      .filters {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="card">
    <h1>Dashboard Reporting</h1>
    <div class="subtitle">Comparativa visual del porcentaje acumulado por día, mes y año.</div>
  </div>

  <div class="card">
    <div class="filters">
      <div class="filter-group">
        <label>Modo de visualización</label>
        <select id="viewMode">
          <option value="month_between_years">Mes entre años</option>
          <option value="months_of_year">Meses de un año</option>
          <option value="full_year">Año completo</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Año</label>
        <select id="yearSelect">
          <option value="2022">2022</option>
<option value="2023">2023</option>
<option value="2024">2024</option>
<option value="2025">2025</option>
<option value="2026">2026</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Mes</label>
        <select id="monthSelect">
          <option value="Enero">Enero</option>
<option value="Febrero">Febrero</option>
<option value="Marzo">Marzo</option>
<option value="Abril">Abril</option>
<option value="Mayo">Mayo</option>
<option value="Junio">Junio</option>
<option value="Julio">Julio</option>
<option value="Agosto">Agosto</option>
<option value="Septiembre">Septiembre</option>
<option value="Octubre">Octubre</option>
<option value="Noviembre">Noviembre</option>
<option value="Diciembre">Diciembre</option>
        </select>
      </div>

      <div class="buttons">
        <button onclick="renderAll()">Actualizar vista</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="kpis">
      <div class="kpi">
        <div class="kpi-title">Series visibles</div>
        <div class="kpi-value" id="kpi-series">-</div>
      </div>
      <div class="kpi">
        <div class="kpi-title">Último % visible</div>
        <div class="kpi-value" id="kpi-last">-</div>
      </div>
      <div class="kpi">
        <div class="kpi-title">Último día visible</div>
        <div class="kpi-value" id="kpi-day">-</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div id="chart"></div>
  </div>

  <div class="card">
    <h3>Tabla de detalle</h3>
    <div class="table-wrap">
      <div id="table-container"></div>
    </div>
  </div>

</div>

const monthOrder = {
  "Enero":1,"Febrero":2,"Marzo":3,"Abril":4,"Mayo":5,"Junio":6,
  "Julio":7,"Agosto":8,"Septiembre":9,"Octubre":10,"Noviembre":11,"Diciembre":12
};

function getValue(id) {
  return document.getElementById(id).value;
}

function getFilteredData() {
  const mode = getValue("viewMode");
  const selectedYear = parseInt(getValue("yearSelect"));
  const selectedMonth = getValue("monthSelect");

  if (mode === "month_between_years") {
    return rawData.filter(r => r.month_name === selectedMonth);
  }

  if (mode === "months_of_year") {
    return rawData.filter(r => r.year === selectedYear);
  }

  if (mode === "full_year") {
    return rawData.filter(r => r.year === selectedYear);
  }

  return rawData;
}

function buildSeries(filtered) {
  const mode = getValue("viewMode");
  const grouped = {};

  filtered.forEach(r => {
    let key = "";
    if (mode === "month_between_years") {
      key = String(r.year);
    } else if (mode === "months_of_year") {
      key = r.month_name;
    } else if (mode === "full_year") {
      key = r.month_name;
    }
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(r);
  });

  let keys = Object.keys(grouped);

  if (mode === "month_between_years") {
    keys = keys.sort((a, b) => parseInt(a) - parseInt(b));
  } else {
    keys = keys.sort((a, b) => monthOrder[a] - monthOrder[b]);
  }

  return keys.map(key => {
    const rows = grouped[key].sort((a,b) => a.day - b.day);
    return {
      key,
      rows
    };
  });
}

function renderChart(series) {
  const mode = getValue("viewMode");
  let chartTitle = "Comparativa";

if (mode === "month_between_years") {
  chartTitle = `Comparativa de ${getValue("monthSelect")} entre años`;
} else if (mode === "months_of_year") {
  chartTitle = `Comparativa de meses del año ${getValue("yearSelect")}`;
} else {
  chartTitle = `Evolución del año ${getValue("yearSelect")}`;
}

  const traces = series.map(s => {
    return {
      x: s.rows.map(r => r.day),
      y: s.rows.map(r => r.value),
      mode: "lines+markers",
      name: s.key,
      hovertemplate: "Día %{x}<br>% acumulado %{y:.2f}%<extra>" + s.key + "</extra>"
    };
  });

  const layout = {
    title: chartTitle,
    xaxis: { title: "Día", dtick: 1 },
    yaxis: { title: "Porcentaje acumulado (%)", range: [0, 105] },
    hovermode: "closest",
    legend: {
      orientation: "v",
      x: 1.02,
      y: 1
    },
    margin: { l: 70, r: 180, t: 70, b: 60 }
  };

  Plotly.newPlot("chart", traces, layout, {responsive: true});
}

function renderTable(series) {
  let rows = [];
  series.forEach(s => {
    s.rows.forEach(r => rows.push({ ...r, series_name: s.key }));
  });

  rows = rows.sort((a, b) => {
    if (a.series_name < b.series_name) return -1;
    if (a.series_name > b.series_name) return 1;
    return a.day - b.day;
  });

  if (!rows.length) {
    document.getElementById("table-container").innerHTML = "<p>No hay datos.</p>";
    return;
  }

  let html = `
    <table>
      <thead>
        <tr>
          <th>Serie</th>
          <th>Año</th>
          <th>Mes</th>
          <th>Día</th>
          <th>% acumulado</th>
          <th>Origen</th>
        </tr>
      </thead>
      <tbody>
  `;

  rows.forEach(r => {
    html += `
      <tr>
        <td>${r.series_name}</td>
        <td>${r.year}</td>
        <td>${r.month_name}</td>
        <td>${r.day}</td>
        <td>${Number(r.value).toFixed(2)}%</td>
        <td>${r.source}</td>
      </tr>
    `;
  });

  html += "</tbody></table>";
  document.getElementById("table-container").innerHTML = html;
}

function renderKPIs(series) {
  const seriesCount = series.length;

  let lastValues = [];
  let lastDays = [];

  series.forEach(s => {
    if (s.rows.length) {
      const last = s.rows[s.rows.length - 1];
      lastValues.push(last.value);
      lastDays.push(last.day);
    }
  });

  const maxLastValue = lastValues.length ? Math.max(...lastValues) : 0;
  const maxLastDay = lastDays.length ? Math.max(...lastDays) : 0;

  document.getElementById("kpi-series").innerText = seriesCount;
  document.getElementById("kpi-last").innerText = lastValues.length ? maxLastValue.toFixed(2) + "%" : "-";
  document.getElementById("kpi-day").innerText = lastDays.length ? maxLastDay : "-";
}

function toggleFilters() {
  const mode = getValue("viewMode");
  const yearSelect = document.getElementById("yearSelect");
  const monthSelect = document.getElementById("monthSelect");

  if (mode === "month_between_years") {
    yearSelect.disabled = true;
    monthSelect.disabled = false;
  } else {
    yearSelect.disabled = false;
    monthSelect.disabled = true;
  }
}

function renderAll() {
  toggleFilters();
  const filtered = getFilteredData();
  const series = buildSeries(filtered);
  renderChart(series);
  renderTable(series);
  renderKPIs(series);
}

document.getElementById("viewMode").addEventListener("change", renderAll);
document.getElementById("yearSelect").addEventListener("change", renderAll);
document.getElementById("monthSelect").addEventListener("change", renderAll);

renderAll();
</script>
